<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: white;
    }

    .product-page {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 50px;
      padding: 40px;
    }

    .product-page img {
      width: 450px;
      border-radius: 12px;
      object-fit: cover;
    }

    .info {
      max-width: 400px;
    }

    .price {
      font-size: 24px;
      margin-top: 10px;
    }

    .back {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn {
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="product-page" id="product"></div>

<script>
/* ---------------- PRODUCTS ---------------- */
const products = {
  1: { name: "RGB Pro X", price: "$120", img: "https://cdn.pixabay.com/photo/2017/08/05/10/16/keyboard-2589430_1280.jpg", desc: "High-performance RGB mechanical gaming keyboard built for speed and accuracy." },
  2: { name: "Strike Blue", price: "$90", img: "https://cdn.pixabay.com/photo/2016/11/29/03/53/keyboard-1869236_1280.jpg", desc: "Clicky blue switches designed for responsive typing and gaming." },
  3: { name: "Silent Red", price: "$75", img: "https://cdn.pixabay.com/photo/2015/01/21/14/14/keyboard-606012_1280.jpg", desc: "Ultra-quiet red switches for smooth and silent gameplay." },
  4: { name: "Black Pro", price: "$110", img: "https://cdn.pixabay.com/photo/2016/03/27/19/36/keyboard-1280538_1280.jpg", desc: "Minimal black professional gaming keyboard with premium build." },
  5: { name: "Neon Beast", price: "$140", img: "https://cdn.pixabay.com/photo/2017/08/10/03/47/keyboard-2619227_1280.jpg", desc: "Full RGB beast keyboard with extreme lighting effects." },
  6: { name: "Starter RGB", price: "$60", img: "https://cdn.pixabay.com/photo/2016/11/29/09/32/keyboard-1867893_1280.jpg", desc: "Budget-friendly RGB keyboard perfect for beginners." },
  7: { name: "Pro White", price: "$100", img: "https://cdn.pixabay.com/photo/2015/05/31/10/55/keyboard-791219_1280.jpg", desc: "Clean white RGB keyboard for aesthetic setups." },
  8: { name: "Elite Max", price: "$160", img: "https://cdn.pixabay.com/photo/2016/10/18/21/22/keyboard-1756955_1280.jpg", desc: "Top-tier esports keyboard built for competitive gaming." }
};

/* ---------------- CART (GLOBAL SAFE SYSTEM) ---------------- */
function getCart() {
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ---------------- LOAD PRODUCT ---------------- */
const id = new URLSearchParams(window.location.search).get("id");
const p = products[id];

if (!p) {
  document.getElementById("product").innerHTML = `
    <div style="text-align:center;width:100%;">
      <h2>Product not found</h2>
      <a href="shop.html" class="back">← Back to Shop</a>
    </div>
  `;
} else {
  document.getElementById("product").innerHTML = `
    <img src="${p.img}">
    
    <div class="info">
      <h1>${p.name}</h1>
      <p>${p.desc}</p>
      <div class="price">${p.price}</div>

      <button class="btn" onclick="addToCart(${id})">
        Add to Cart
      </button>

      <a class="back" href="shop.html">← Back to Shop</a>
    </div>
  `;
}

/* ---------------- ADD TO CART (FIXED) ---------------- */
function addToCart(id) {
  let cart = getCart();

  cart.push({
    id: id,
    name: products[id].name,
    price: products[id].price,
    img: products[id].img
  });

  saveCart(cart);

  showToast(products[id].name + " added to cart");
}

/* ---------------- TOAST ---------------- */
function showToast(msg) {
  const t = document.createElement("div");
  t.innerText = msg;

  t.style.position = "fixed";
  t.style.bottom = "20px";
  t.style.left = "50%";
  t.style.transform = "translateX(-50%)";
  t.style.background = "black";
  t.style.color = "white";
  t.style.padding = "10px 15px";
  t.style.borderRadius = "8px";
  t.style.zIndex = "9999";

  document.body.appendChild(t);

  setTimeout(() => t.remove(), 1500);
}
</script>

</body>
</html>
