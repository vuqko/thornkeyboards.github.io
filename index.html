<!DOCTYPE html>
<html>
<head>
  <title>Thorn Keyboards</title>
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: white;
    }

    .wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background: #f3f3f3;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #e6e6e6;
      border-radius: 8px;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #d6d6d6;
    }

    /* MAIN */
    .main {
      flex: 1;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(60%);
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    .hero-text h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero-text p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #ddd;
    }

    /* ABOUT */
    #about {
      padding: 80px;
      text-align: center;
    }

    #about h2 {
      margin-bottom: 15px;
    }

    #about p {
      max-width: 600px;
      margin: auto;
      color: #444;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="sidebar">
    <h2>Thorn</h2>
    <a href="shop.html"><button>Shop</button></a>
    <a href="#about"><button>About</button></a>
  </div>

  <div class="main">

    <div class="hero">
      <img src="https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?auto=format&fit=crop&w=1600&q=80">
      <div class="hero-text">
        <h1>Thorn Keyboards</h1>
        <p>High-performance gaming keyboards</p>
        <a class="btn" href="shop.html">Shop Now</a>
      </div>
    </div>

    <div id="about">
      <h2>About Us</h2>
      <p>
        We design premium mechanical gaming keyboards with RGB lighting,
        fast switches, and durable build quality for gamers worldwide.
      </p>
    </div>

  </div>
</div>

</body>
</html>
