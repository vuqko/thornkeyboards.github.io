<!DOCTYPE html>
<html>
<head>
  <title>Shop - Thorn Keyboards</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* extra safety styling so nothing breaks */
    * { transition: all 0.2s ease; }

    .search-bar {
      width: 60%;
      padding: 12px;
      margin: 20px auto;
      display: block;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .top-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0 20px 0;
    }

    .top-actions button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e6e6e6;
      cursor: pointer;
    }

    .top-actions button:hover {
      background: #d6d6d6;
    }

    .cart-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 1000;
    }

    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #f5f5f5;
      padding: 20px;
      display: none;
      overflow-y: auto;
      z-index: 999;
    }

    .cart-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      text-decoration: none;
      color: black;
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card p {
      margin: 5px;
    }

  </style>
</head>

<body>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
  Cart 🛒 (<span id="count">0</span>)
</div>

<!-- CART PANEL -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<!-- SEARCH -->
<input class="search-bar" id="search" placeholder="Search keyboards..." oninput="searchItems()">

<!-- SORT BUTTONS -->
<div class="top-actions">
  <button onclick="sortBy('trending')">Trending</button>
  <button onclick="sortBy('low')">Price Low</button>
  <button onclick="sortBy('high')">Price High</button>
</div>

<h2 style="text-align:center;">All Keyboards</h2>

<!-- PRODUCTS GRID -->
<div class="grid" id="grid">

  <a class="card" data-price="120" href="product.html?id=1" onclick="addToCart('RGB Pro X','$120')">
    <img src="https://images.unsplash.com/photo-1595044426077-d36d9236d54a">
    <p>RGB Pro X</p>
    <p>$120</p>
  </a>

  <a class="card" data-price="90" href="product.html?id=2" onclick="addToCart('Strike Blue','$90')">
    <img src="https://images.unsplash.com/photo-1629429408209-1f2b4b7b0f4f">
    <p>Strike Blue</p>
    <p>$90</p>
  </a>

  <a class="card" data-price="75" href="product.html?id=3" onclick="addToCart('Silent Red','$75')">
    <img src="https://images.unsplash.com/photo-1612810806695-30f7c9c6b1a8">
    <p>Silent Red</p>
    <p>$75</p>
  </a>

  <a class="card" data-price="110" href="product.html?id=4" onclick="addToCart('Black Pro','$110')">
    <img src="https://images.unsplash.com/photo-1616788494686-4c7d3b8d1f63">
    <p>Black Pro</p>
    <p>$110</p>
  </a>

  <a class="card" data-price="140" href="product.html?id=5" onclick="addToCart('Neon Beast','$140')">
    <img src="https://images.unsplash.com/photo-1629429407815-0b7c9d4f2c88">
    <p>Neon Beast</p>
    <p>$140</p>
  </a>

  <a class="card" data-price="60" href="product.html?id=6" onclick="addToCart('Starter RGB','$60')">
    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3c5b1">
    <p>Starter RGB</p>
    <p>$60</p>
  </a>

  <a class="card" data-price="100" href="product.html?id=7" onclick="addToCart('Pro White','$100')">
    <img src="https://images.unsplash.com/photo-1611078489935-0c1a1f0b4d9c">
    <p>Pro White</p>
    <p>$100</p>
  </a>

  <a class="card" data-price="160" href="product.html?id=8" onclick="addToCart('Elite Max','$160')">
    <img src="https://images.unsplash.com/photo-1608043152269-423dbba4e7e1">
    <p>Elite Max</p>
    <p>$160</p>
  </a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ADD TO CART */
function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* UPDATE CART UI */
function updateCart() {
  document.getElementById("count").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(item => {
    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        ${item.price}
      </div>
    `;
  });
}

/* TOGGLE CART */
function toggleCart() {
  const c = document.getElementById("cart");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* SEARCH */
function searchItems() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(input)
      ? "block"
      : "none";
  });
}

/* SORTING */
function sortBy(type) {
  let grid = document.getElementById("grid");
  let cards = Array.from(grid.children);

  if (type === "low") {
    cards.sort((a,b) => getPrice(a) - getPrice(b));
  }

  if (type === "high") {
    cards.sort((a,b) => getPrice(b) - getPrice(a));
  }

  if (type === "trending") {
    cards.sort(() => Math.random() - 0.5);
  }

  grid.innerHTML = "";
  cards.forEach(c => grid.appendChild(c));
}

/* PRICE PARSER */
function getPrice(card) {
  return parseInt(card.dataset.price);
}

/* INIT */
updateCart();
</script>

</body>
</html>
