<!DOCTYPE html>
<html>
<head>
  <title>Shop - Thorn Keyboards</title>

  <style>
    * {
      box-sizing: border-box;
      transition: all 0.2s ease;
      font-family: Arial;
    }

    body {
      margin: 0;
      background: white;
    }

    /* HOME BUTTON */
    .home-btn {
      position: fixed;
      left: 20px;
      top: 20px;
      background: #eee;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      color: black;
      z-index: 1000;
    }

    /* SEARCH */
    .search-bar {
      width: 60%;
      padding: 12px;
      margin: 80px auto 20px;
      display: block;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    /* SORT */
    .top-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .top-actions button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e6e6e6;
      cursor: pointer;
    }

    .top-actions button:hover {
      background: #d6d6d6;
    }

    /* CART BUTTON */
    .cart-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 1000;
    }

    /* CART PANEL */
    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #f5f5f5;
      padding: 20px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      z-index: 999;
    }

    .cart.open {
      transform: translateX(0);
    }

    .cart-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .remove-btn {
      margin-top: 6px;
      padding: 5px 8px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card p {
      margin: 6px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<a href="index.html" class="home-btn">← Home</a>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
  Cart 🛒 (<span id="count">0</span>)
</div>

<!-- CART PANEL -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<!-- SEARCH -->
<input class="search-bar" id="search" placeholder="Search keyboards..." oninput="searchItems()">

<!-- SORT -->
<div class="top-actions">
  <button onclick="sortBy('trending')">Trending</button>
  <button onclick="sortBy('low')">Price Low</button>
  <button onclick="sortBy('high')">Price High</button>
</div>

<h2 style="text-align:center;">All Keyboards</h2>

<!-- GRID -->
<div class="grid" id="grid">

  <div class="card" data-id="1" data-price="120">
    <img src="https://cdn.pixabay.com/photo/2017/08/05/10/16/keyboard-2589430_1280.jpg">
    <p>RGB Pro X</p>
    <p>$120</p>
  </div>

  <div class="card" data-id="2" data-price="90">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/keyboard-1869236_1280.jpg">
    <p>Strike Blue</p>
    <p>$90</p>
  </div>

  <div class="card" data-id="3" data-price="75">
    <img src="https://cdn.pixabay.com/photo/2015/01/21/14/14/keyboard-606012_1280.jpg">
    <p>Silent Red</p>
    <p>$75</p>
  </div>

  <div class="card" data-id="4" data-price="110">
    <img src="https://cdn.pixabay.com/photo/2016/03/27/19/36/keyboard-1280538_1280.jpg">
    <p>Black Pro</p>
    <p>$110</p>
  </div>

  <div class="card" data-id="5" data-price="140">
    <img src="https://cdn.pixabay.com/photo/2017/08/10/03/47/keyboard-2619227_1280.jpg">
    <p>Neon Beast</p>
    <p>$140</p>
  </div>

  <div class="card" data-id="6" data-price="60">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/keyboard-1867893_1280.jpg">
    <p>Starter RGB</p>
    <p>$60</p>
  </div>

  <div class="card" data-id="7" data-price="100">
    <img src="https://cdn.pixabay.com/photo/2015/05/31/10/55/keyboard-791219_1280.jpg">
    <p>Pro White</p>
    <p>$100</p>
  </div>

  <div class="card" data-id="8" data-price="160">
    <img src="https://cdn.pixabay.com/photo/2016/10/18/21/22/keyboard-1756955_1280.jpg">
    <p>Elite Max</p>
    <p>$160</p>
  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* INIT CLICK EVENTS */
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {
    const id = card.dataset.id;
    window.location.href = "product.html?id=" + id;
  });
});

/* CART */
function addToCart(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const name = card.querySelector("p").innerText;
  const price = "$" + card.dataset.price;

  cart.push({ name, price });
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* REMOVE */
function removeItem(i) {
  cart.splice(i, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* UPDATE CART */
function updateCart() {
  document.getElementById("count").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach((item, i) => {
    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        ${item.price}
        <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });
}

/* TOGGLE CART */
function toggleCart() {
  document.getElementById("cart").classList.toggle("open");
}

/* SEARCH */
function searchItems() {
  const val = document.getElementById("search").value.toLowerCase();

  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(val)
      ? "block"
      : "none";
  });
}

/* SORT */
function sortBy(type) {
  const grid = document.getElementById("grid");
  let cards = Array.from(grid.children);

  if (type === "low") cards.sort((a,b)=>a.dataset.price-b.dataset.price);
  if (type === "high") cards.sort((a,b)=>b.dataset.price-a.dataset.price);
  if (type === "trending") cards.sort(()=>Math.random()-0.5);

  grid.innerHTML = "";
  cards.forEach(c => grid.appendChild(c));
}

/* LOAD */
updateCart();
</script>

</body>
</html>
