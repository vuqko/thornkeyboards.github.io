<!DOCTYPE html>
<html>
<head>
  <title>Shop - Thorn Keyboards</title>
  <link rel="stylesheet" href="style.css">

  <style>
    * { transition: all 0.2s ease; }

    body {
      margin: 0;
      font-family: Arial;
      background: white;
    }

    .home-btn {
      position: fixed;
      left: 20px;
      top: 20px;
      background: #eee;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      color: black;
      z-index: 1000;
    }

    .search-bar {
      width: 60%;
      padding: 12px;
      margin: 80px auto 20px auto;
      display: block;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .top-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .top-actions button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e6e6e6;
      cursor: pointer;
    }

    .top-actions button:hover {
      background: #d6d6d6;
    }

    .cart-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 1000;
    }

    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #f5f5f5;
      padding: 20px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      z-index: 999;
    }

    .cart.open {
      transform: translateX(0%);
    }

    .cart-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .cart-item button {
      margin-top: 5px;
      background: red;
      color: white;
      border: none;
      padding: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      text-decoration: none;
      color: black;
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card p {
      margin: 5px;
    }
  </style>
</head>

<body>

<a href="index.html" class="home-btn">← Home</a>

<div class="cart-btn" onclick="toggleCart()">
  Cart 🛒 (<span id="count">0</span>)
</div>

<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<input class="search-bar" id="search" placeholder="Search keyboards..." oninput="searchItems()">

<div class="top-actions">
  <button onclick="sortBy('trending')">Trending</button>
  <button onclick="sortBy('low')">Price Low</button>
  <button onclick="sortBy('high')">Price High</button>
</div>

<h2 style="text-align:center;">All Keyboards</h2>

<div class="grid" id="grid">

  <a class="card" data-price="120" href="product.html?id=1">
    <img src="https://cdn.pixabay.com/photo/2017/08/05/10/16/keyboard-2589430_1280.jpg">
    <p>RGB Pro X</p>
    <p>$120</p>
  </a>

  <a class="card" data-price="90" href="product.html?id=2">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/keyboard-1869236_1280.jpg">
    <p>Strike Blue</p>
    <p>$90</p>
  </a>

  <a class="card" data-price="75" href="product.html?id=3">
    <img src="https://cdn.pixabay.com/photo/2015/01/21/14/14/keyboard-606012_1280.jpg">
    <p>Silent Red</p>
    <p>$75</p>
  </a>

  <a class="card" data-price="110" href="product.html?id=4">
    <img src="https://cdn.pixabay.com/photo/2016/03/27/19/36/keyboard-1280538_1280.jpg">
    <p>Black Pro</p>
    <p>$110</p>
  </a>

  <a class="card" data-price="140" href="product.html?id=5">
    <img src="https://cdn.pixabay.com/photo/2017/08/10/03/47/keyboard-2619227_1280.jpg">
    <p>Neon Beast</p>
    <p>$140</p>
  </a>

  <a class="card" data-price="60" href="product.html?id=6">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/keyboard-1867893_1280.jpg">
    <p>Starter RGB</p>
    <p>$60</p>
  </a>

  <a class="card" data-price="100" href="product.html?id=7">
    <img src="https://cdn.pixabay.com/photo/2015/05/31/10/55/keyboard-791219_1280.jpg">
    <p>Pro White</p>
    <p>$100</p>
  </a>

  <a class="card" data-price="160" href="product.html?id=8">
    <img src="https://cdn.pixabay.com/photo/2016/10/18/21/22/keyboard-1756955_1280.jpg">
    <p>Elite Max</p>
    <p>$160</p>
  </a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach((item, index) => {
    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        ${item.price}
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });
}

function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("open");
}

function searchItems() {
  let input = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

function sortBy(type) {
  let grid = document.getElementById("grid");
  let cards = Array.from(grid.children);

  if (type === "low") cards.sort((a,b)=>getPrice(a)-getPrice(b));
  if (type === "high") cards.sort((a,b)=>getPrice(b)-getPrice(a));
  if (type === "trending") cards.sort(()=>Math.random()-0.5);

  grid.innerHTML = "";
  cards.forEach(c => grid.appendChild(c));
}

function getPrice(card) {
  return Number(card.dataset.price);
}

updateCart();
</script>

</body>
</html>
